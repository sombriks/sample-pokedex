---
name: Run Maven Tests
on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "main" ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          cache: maven
          java-version: '25'
          distribution: 'temurin'
      - run: ./mvnw -B package
