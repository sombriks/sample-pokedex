---
name: dev-environment
services:
  restapi:
    image: sombriks/restapi:dev
    build:
      context: ../../../
      dockerfile: src/infra/Dockerfile
      tags:
        - sombriks/restapi:dev
    environment:
      DB_HOST: db
    ports:
      - "8080:8080"
    depends_on:
      - db
  db:
    extends:
      file: docker-compose-db.yml
      service: db
