---
name: database
services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: restapi
      POSTGRES_USER: restapi
      POSTGRES_PASSWORD: restapi
    ports:
      - "5432:5432"
    healthcheck:
      retries: 5
      timeout: 5s
      interval: 10s
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER}" ]


